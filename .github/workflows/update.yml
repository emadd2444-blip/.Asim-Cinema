name: Asim No-Key Scraper
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Fetch Movies & Series (No API Key Needed!)
        run: |
          python -c "
          import requests
          import json
          import sys

          print('--- Starting No-Key Scraper ---')
          movies_list = []

          # 1. سحب الأفلام من مكتبة YTS المفتوحة
          try:
              print('Fetching Movies...')
              # نسحب 10 صفحات (500 فيلم جديد)
              for p in range(1, 11):
                  url = f'https://yts.mx/api/v2/list_movies.json?limit=50&page={p}&sort_by=download_count'
                  r = requests.get(url, timeout=10)
                  if r.status_code == 200:
                      data = r.json().get('data', {}).get('movies', [])
                      for m in data:
                          if m.get('imdb_code') and m.get('medium_cover_image'):
                              movies_list.append({
                                  'title': m['title'],
                                  'img': m['medium_cover_image'],
                                  'id': m['imdb_code'], # كود IMDb السحري
                                  'type': 'movie'
                              })
              print(f'Movies fetched successfully. Total so far: {len(movies_list)}')
          except Exception as e:
              print(f'Movies Fetch Error: {e}')

          # 2. سحب المسلسلات من مكتبة TVMaze المفتوحة
          try:
              print('Fetching Series...')
              # نسحب صفحتين (500 مسلسل)
              for p in range(0, 2):
                  url = f'https://api.tvmaze.com/shows?page={p}'
                  r = requests.get(url, timeout=10)
                  if r.status_code == 200:
                      shows = r.json()
                      for s in shows:
                          imdb_id = s.get('externals', {}).get('imdb')
                          img = s.get('image', {}).get('original') or s.get('image', {}).get('medium')
                          if imdb_id and img:
                              movies_list.append({
                                  'title': s['name'],
                                  'img': img,
                                  'id': imdb_id,
                                  'type': 'tv'
                              })
              print(f'Series fetched successfully. Total items: {len(movies_list)}')
          except Exception as e:
              print(f'Series Fetch Error: {e}')

          # حفظ البيانات في الملف (حوالي 1000 عنوان فوري)
          if len(movies_list) > 0:
              with open('movies.json', 'w', encoding='utf-8') as f:
                  json.dump(movies_list, f, ensure_ascii=False, indent=2)
              print('Library saved successfully!')
          else:
              print('Error: No data scraped.')
              sys.exit(1)
          "
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Asim-Bot"
          git add movies.json
          git commit -m "🚀 تحديث المكتبة - بدون مفتاح وبدون حظر" || exit 0
          git push
