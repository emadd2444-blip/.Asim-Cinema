name: Asim Arabic Cinema Scraper
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape Arabic Sites
        run: |
          python -c "
          import requests
          from bs4 import BeautifulSoup
          import json

          def scrape_akwam():
              base_url = 'https://ak.sv' # رابط أكوام الحالي
              headers = {'User-Agent': 'Mozilla/5.0'}
              movies = []
              
              # سحب أول 3 صفحات (حوالي 60-100 عنوان جديد في كل مرة)
              for p in range(1, 4):
                  try:
                      r = requests.get(f'{base_url}/movies?page={p}', headers=headers, timeout=15)
                      soup = BeautifulSoup(r.text, 'html.parser')
                      items = soup.find_all('div', class_='entry-box')
                      
                      for item in items:
                          title = item.find('h3').text.strip() if item.find('h3') else 'فيلم جديد'
                          img = item.find('img')['src'] if item.find('img') else ''
                          link = item.find('a')['href'] if item.find('a') else ''
                          
                          if link:
                              movies.append({
                                  'title': title,
                                  'img': img,
                                  'link': link, # رابط صفحة الفيلم في أكوام
                                  'type': 'movie'
                              })
                  except:
                      continue
              return movies

          # جلب الأفلام الجديدة
          new_movies = scrape_akwam()

          # تحميل المكتبة القديمة ودمج الجديد معها (عشان نوصل للـ 15 ألف)
          try:
              with open('movies.json', 'r', encoding='utf-8') as f:
                  old_movies = json.load(f)
          except:
              old_movies = []

          # دمج بدون تكرار
          existing_links = {m['link'] for m in old_movies}
          for m in new_movies:
              if m['link'] not in existing_links:
                  old_movies.insert(0, m)

          # الاحتفاظ بآخر 5000 عنوان (عشان السرعة)
          final_list = old_movies[:5000]

          with open('movies.json', 'w', encoding='utf-8') as f:
              json.dump(final_list, f, ensure_ascii=False, indent=2)
          "
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Asim-Arabic-Bot"
          git add movies.json
          git commit -m "🚀 تم تحديث الأفلام العربية" || exit 0
          git push
