name: Asim Cinema Super Fetcher
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# إضافة هذا السطر لحل مشكلة الـ 403 نهائياً
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Run Super Scraper
        run: |
          python -c "
          import requests, json
          api_key = '8d6d91d92468487622723ad66479700b'
          full_data = []
          for p in range(1, 11): # زدنا الصفحات عشان عاصم يوصل للـ 15 ألف أسرع
              r_m = requests.get(f'https://api.themoviedb.org/3/movie/popular?api_key={api_key}&language=ar-SA&page={p}')
              if r_m.status_code == 200:
                  for m in r_m.json().get('results', []):
                      full_data.append({'title': m['title'], 'img': 'https://image.tmdb.org/t/p/w500' + m['poster_path'], 'id': m['id'], 'type': 'movie'})
              r_s = requests.get(f'https://api.themoviedb.org/3/tv/popular?api_key={api_key}&language=ar-SA&page={p}')
              if r_s.status_code == 200:
                  for s in r_s.json().get('results', []):
                      full_data.append({'title': s['name'], 'img': 'https://image.tmdb.org/t/p/w500' + s['poster_path'], 'id': s['id'], 'type': 'tv'})
          with open('movies.json', 'w', encoding='utf-8') as f:
              json.dump(full_data, f, ensure_ascii=False, indent=2)
          "
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Asim-Cinema-Bot"
          git add movies.json
          git commit -m "Update Cinema Library" || exit 0
          git push
