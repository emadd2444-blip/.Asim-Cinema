name: Asim Reliable Scraper PRO
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Fetch Global Library (Anti-Block)
        run: |
          python -c "
          import requests
          import json
          import sys

          print('--- Starting Reliable Scraper ---')
          api_key = '50c33e24bc8653768393e8243398c83e'
          movies = []

          try:
              # نسحب 10 صفحات (حوالي 200 فيلم ومسلسل كل 10 دقائق)
              for p in range(1, 11):
                  print(f'Fetching page {p}...')
                  url = f'https://api.themoviedb.org/3/trending/all/day?api_key={api_key}&language=ar-SA&page={p}'
                  r = requests.get(url, timeout=10)
                  
                  if r.status_code == 200:
                      results = r.json().get('results', [])
                      print(f'Found {len(results)} items on page {p}')
                      
                      for m in results:
                          if m.get('poster_path'):
                              movies.append({
                                  'title': m.get('title') or m.get('name'),
                                  'img': 'https://image.tmdb.org/t/p/w500' + m['poster_path'],
                                  'id': str(m['id']),
                                  'type': m.get('media_type', 'movie')
                              })
                  else:
                      print(f'Error fetching page {p}: {r.status_code}')

              print(f'Total scraped: {len(movies)}')

              # دمج مع القديم إذا وجد لزيادة العدد
              try:
                  with open('movies.json', 'r', encoding='utf-8') as f:
                      old_movies = json.load(f)
              except:
                  old_movies = []

              existing_ids = {m['id'] for m in old_movies}
              added = 0
              for m in movies:
                  if m['id'] not in existing_ids:
                      old_movies.insert(0, m)
                      added += 1
              
              print(f'Added {added} new items.')
              
              final_list = old_movies[:5000]

              with open('movies.json', 'w', encoding='utf-8') as f:
                  json.dump(final_list, f, ensure_ascii=False, indent=2)

          except Exception as e:
              print(f'Critical Error: {e}')
              sys.exit(1)
          print('--- Scraper Finished ---')
          "
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Asim-Bot"
          git add movies.json
          git commit -m "🚀 تحديث المكتبة - بدون حظر 403" || exit 0
          git push
