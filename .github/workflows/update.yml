name: Asim Categorized Scraper
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Fetch Movies & Series with Genres
        run: |
          python -c "
          import requests, json, sys

          movies_list = []

          # سحب الأفلام مع التصنيفات (أكشن، دراما...)
          try:
              for p in range(1, 11):
                  url = f'https://yts.mx/api/v2/list_movies.json?limit=50&page={p}&sort_by=download_count'
                  r = requests.get(url, timeout=10)
                  if r.status_code == 200:
                      data = r.json().get('data', {}).get('movies', [])
                      for m in data:
                          if m.get('imdb_code') and m.get('medium_cover_image'):
                              movies_list.append({
                                  'title': m['title'],
                                  'img': m['medium_cover_image'],
                                  'id': m['imdb_code'],
                                  'type': 'movie',
                                  'genres': m.get('genres', []) # جلب التصنيفات
                              })
          except Exception as e: print(e)

          # سحب المسلسلات مع التصنيفات
          try:
              for p in range(0, 2):
                  url = f'https://api.tvmaze.com/shows?page={p}'
                  r = requests.get(url, timeout=10)
                  if r.status_code == 200:
                      shows = r.json()
                      for s in shows:
                          imdb_id = s.get('externals', {}).get('imdb')
                          img = s.get('image', {}).get('original') or s.get('image', {}).get('medium')
                          if imdb_id and img:
                              movies_list.append({
                                  'title': s['name'],
                                  'img': img,
                                  'id': imdb_id,
                                  'type': 'tv',
                                  'genres': s.get('genres', []) # جلب التصنيفات
                              })
          except Exception as e: print(e)

          if len(movies_list) > 0:
              with open('movies.json', 'w', encoding='utf-8') as f:
                  json.dump(movies_list, f, ensure_ascii=False, indent=2)
          "
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Asim-Bot"
          git add movies.json
          git commit -m "🚀 تحديث المكتبة مع التصنيفات" || exit 0
          git push
